name: MEXC Crypto Monitor

on:
  schedule:
    # 9:00 CZ (7:00 UTC v zimě, 8:00 UTC v létě)
    - cron: '0 7 * * *'
    - cron: '0 8 * * *'
    # 15:00 CZ (13:00 UTC v zimě, 14:00 UTC v létě)
    - cron: '0 13 * * *'
    - cron: '0 14 * * *'
  
  workflow_dispatch:  # Aby si mohl spustit ručně

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Run MEXC Monitor
        env:
          MEXC_ACCESS_KEY: ${{ secrets.MEXC_ACCESS_KEY }}
          MEXC_SECRET_KEY: ${{ secrets.MEXC_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python mexc_monitor.py
      
      - name: Auto commit data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add weekly_data.json || true
          git commit -m "Auto: Update MEXC data $(date -u +'%Y-%m-%d %H:%M:%S')" || true
          git push || true
