name: MEXC Crypto Monitor

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 8 * * *'
    - cron: '0 13 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      - name: Run MEXC Monitor
        env:
          MEXC_ACCESS_KEY: ${{ secrets.MEXC_ACCESS_KEY }}
          MEXC_SECRET_KEY: ${{ secrets.MEXC_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python mexc_monitor.py
      - run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add weekly_data.json || true
          git commit -m "Auto: $(date -u +'%Y-%m-%d %H:%M:%S')" || true
          git push || true
