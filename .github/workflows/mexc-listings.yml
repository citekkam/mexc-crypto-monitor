name: 🪙 MEXC New Listings Scraper

on:
  schedule:
    # Spustí se každý den ve 9:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Umožní manuální spuštění přes GitHub UI

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repozitáře
        uses: actions/checkout@v4

      - name: 🐍 Nastavení Pythonu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalace závislostí
        run: |
          pip install playwright requests python-dateutil
          playwright install chromium
          playwright install-deps chromium

      - name: 🔍 Scraping MEXC New Listings
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/scrape_mexc.py
