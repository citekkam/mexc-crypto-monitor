name: 🪙 MEXC New Listings Scraper

on:
  schedule:
    - cron: '0 8,14,20 * * *'   # 3x daily: 8:00, 14:00, 20:00 UTC
  workflow_dispatch:             # allow manual trigger

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write    # needed to trigger other workflows via repository_dispatch

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 💾 Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: 📦 Install dependencies
        run: |
          pip install playwright requests python-dateutil
          playwright install chromium
          playwright install-deps chromium

      - name: 🔍 Scrape & trigger monitors
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
        run: python scripts/scrape_mexc.py

      - name: 💾 Commit updated listings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pending_listings.json
          git diff --staged --quiet || git commit -m "chore: update pending listings [skip ci]"
          git push
