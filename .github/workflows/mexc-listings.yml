name: 🪙 MEXC New Listings Scraper

on:
  schedule:
    - cron: '0 8,14,20 * * *'
  workflow_dispatch:

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 💾 Cache Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: 📦 Install deps
        run: |
          pip install playwright requests python-dateutil
          playwright install chromium
          playwright install-deps chromium

      - name: 🔍 Scrape & trigger monitors
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_PAT:             ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
        run: python scripts/scrape_mexc.py

      - name: 💾 Commit listings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pending_listings.json
          git diff --staged --quiet || git commit -m "chore: update listings [skip ci]"
          git push
