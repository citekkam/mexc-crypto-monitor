name: 📊 MEXC Listing Price Monitor

on:
  repository_dispatch:
    types: [monitor-listing]
  workflow_dispatch:
    inputs:
      symbol:
        description: 'Coin symbol (e.g. BTC)'
        required: true
      listing_time_ts:
        description: 'Unix timestamp of listing (0 = now)'
        required: true
        default: '0'
      listing_time_str:
        description: 'Human readable time (e.g. 2026-04-28 10:00 UTC)'
        required: true
        default: 'manual test'

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install deps
        run: pip install requests

      - name: Set env variables
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "COIN_SYMBOL=${{ github.event.inputs.symbol }}" >> $GITHUB_ENV
            echo "LISTING_TIME_TS=${{ github.event.inputs.listing_time_ts }}" >> $GITHUB_ENV
            echo "LISTING_TIME_STR=${{ github.event.inputs.listing_time_str }}" >> $GITHUB_ENV
          else
            echo "COIN_SYMBOL=${{ github.event.client_payload.symbol }}" >> $GITHUB_ENV
            echo "LISTING_TIME_TS=${{ github.event.client_payload.listing_time_ts }}" >> $GITHUB_ENV
            echo "LISTING_TIME_STR=${{ github.event.client_payload.listing_time_str }}" >> $GITHUB_ENV
          fi

      - name: 📊 Monitor price
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/monitor_listing.py
